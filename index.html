<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StratosLink | RTK Survey Tool</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    
    <div class="ui-panel">
        <div class="status-header">
            <span id="status">📡 StratosLink: Ready</span>
            <span id="fix-badge" class="badge p-low">No Fix</span>
        </div>
        <div id="stats">Acc: -- | Sats: -- | Fix: --</div>

        <div class="survey-box">
            <textarea id="noteInput" placeholder="Describe the point or observation..."></textarea>
            <div class="action-bar">
                <label class="camera-btn">
                    📷 Photo
                    <input type="file" id="imageInput" accept="image/*" capture="environment">
                </label>
                <button id="saveNoteBtn" class="btn-primary">Log Point</button>
            </div>
            <div id="imagePreview" class="hidden"></div>
        </div>

        <div class="log-container">
            <div class="tabs">
                <button onclick="switchView('notes')" id="btn-notes" class="tab-btn active">Observations</button>
                <button onclick="switchView('gps')" id="btn-gps" class="tab-btn">Live GPS</button>
            </div>
            <div class="content-wrapper">
                <div id="notesList" class="notes-feed"></div>
                <div id="gpsView" class="hidden">
                    <table>
                        <thead><tr><th>Time</th><th>Coords</th><th>Acc</th><th>Fix</th></tr></thead>
                        <tbody id="logBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="footer-actions">
            <button id="connectBle" class="btn-ble">Connect Hardware</button>
            <button id="downloadCsv" class="btn-secondary">Export .CSV</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
