<div class="ui-panel main-survey">
    <div class="status-bar">
        <span id="status">📡 StratosLink: Ready</span>
        <span id="fix-badge" class="badge p-low">No Fix</span>
    </div>

    <div class="note-section">
        <textarea id="noteInput" placeholder="Enter field observation..."></textarea>
        
        <div class="attachment-bar">
            <label class="file-input-label">
                📷 Attach Photo
                <input type="file" id="imageInput" accept="image/*" capture="environment">
            </label>
            <button id="saveNoteBtn" class="btn-primary">Log Observation</button>
        </div>
        <div id="imagePreview" class="hidden"></div>
    </div>

    <div class="log-container">
        <div class="tabs">
            <button onclick="switchView('notes')" id="btn-notes" class="tab-btn active">Observations</button>
            <button onclick="switchView('second')" id="btn-sec" class="tab-btn">Live GPS</button>
        </div>
        <div class="table-wrapper">
            <div id="notesList" class="notes-feed"></div>
            <table id="gpsTable" class="hidden">
                <thead><tr><th>Time</th><th>Coords</th><th>Acc</th><th>Fix</th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>
    
    <button id="downloadCsv" class="btn-secondary">Export Full Survey (.CSV)</button>
</div>
